<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex, nofollow" />
    <style>
      body {
        background: #121212;
        color: #eee;
        font-family: monospace;
      }
      .grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        justify-items: center;
        align-items: center;
      }
      a {
        color: #809fff;
      }
      img {
        max-width: 300px;
        max-height: 300px;
      }
    </style>
    <script src="/lazy-load.js"></script>
  </head>
  <body>
    {breadcrumbs}
    <hr />
    {entries}
  </body>
</html>
